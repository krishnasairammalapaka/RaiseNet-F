<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Users — RaiseNet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gradient-text { background: linear-gradient(90deg,#6366f1,#06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex">
  <!-- Sidebar -->
  <div id="sidebar-container"></div>
  <!-- Main Content -->
  <main class="flex-1 flex flex-col min-h-screen">
    <header class="bg-gray-900 border-b border-gray-800 px-8 py-4 flex items-center justify-between">
      <h1 class="text-2xl font-extrabold gradient-text">Users</h1>
      <span class="text-gray-400 text-sm">Manage platform users.</span>
    </header>
    <section class="flex-1 p-8">
      <h2 class="text-xl font-bold mb-4">All Users</h2>
      <div id="users-list" class="overflow-x-auto"></div>
    </section>
  </main>
  <script src="/js/sidebar-logout.js"></script>
  <script>
    fetch('/admin/sidebar.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('sidebar-container').innerHTML = html;
        if(window.setupSidebarLogout) window.setupSidebarLogout();
      });
    if(window.checkSessionOrRedirect) window.checkSessionOrRedirect('admin');
    async function loadUsers() {
      const container = document.getElementById('users-list');
      container.innerHTML = '<div class="text-gray-400">Loading users...</div>';
      try {
        const res = await fetch('/api/admin/users');
        const { data } = await res.json();
        container.innerHTML = `<table class='min-w-full text-left text-sm'><thead><tr><th>Email</th><th>Role</th><th>Last Login</th><th>Last Logout</th><th>Status</th></tr></thead><tbody>${data.map(u => `<tr><td>${u.email}</td><td style='color:${u.role==='admin'?'#06b6d4':'inherit'};font-weight:${u.role==='admin'?'bold':'normal'}'>${u.role}</td><td>${u.last_login||''}</td><td>${u.last_logout||''}</td><td>${u.is_logged_in?'Online':'Offline'}</td></tr>`).join('')}</tbody></table>`;
      } catch {
        container.innerHTML = '<div class="text-red-400">Failed to load users.</div>';
      }
    }
    document.addEventListener('DOMContentLoaded', loadUsers);
  </script>
</body>
</html>
