<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — RaiseNet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gradient-text { background: linear-gradient(90deg,#6366f1,#06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex">
  <!-- Sidebar -->
  <div id="sidebar-container"></div>
  <!-- Main Content -->
  <main class="flex-1 flex flex-col min-h-screen">
    <header class="bg-gray-900 border-b border-gray-800 px-8 py-4 flex items-center justify-between">
      <h1 class="text-2xl font-extrabold gradient-text">Profile</h1>
      <span class="text-gray-400 text-sm">Manage your account details.</span>
    </header>
    <section class="flex-1 p-8">
      <div class="max-w-xl mx-auto bg-gray-900 rounded-xl shadow p-8">
        <h2 class="text-xl font-bold mb-4">Account Information</h2>
        <form class="flex flex-col gap-4">
          <div>
            <label class="block text-gray-400 mb-1">Email</label>
            <input type="email" value="user@raisnet.com" disabled class="w-full px-4 py-2 rounded border border-gray-700 bg-gray-800 text-gray-100" />
          </div>
          <div>
            <label class="block text-gray-400 mb-1">Change Password</label>
            <input type="password" placeholder="New password" class="w-full px-4 py-2 rounded border border-gray-700 bg-gray-800 text-gray-100" />
          </div>
          <button type="button" class="bg-cyan-500 text-white px-6 py-2 rounded hover:bg-cyan-600 font-semibold">Update Profile</button>
        </form>
      </div>
    </section>
  </main>
  <script>
    // Inject sidebar.html into the sidebar-container
    fetch('/customer/sidebar.html')
      .then(res => res.text())
      .then(html => {
        document.getElementById('sidebar-container').innerHTML = html;
      });
  </script>
</body>
</html>
