<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — RaiseNet</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .gradient-text { background: linear-gradient(90deg,#6366f1,#06b6d4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex flex-col">

  <!-- NAVBAR -->
  <nav class="bg-gray-900 border-b border-gray-800">
    <div class="max-w-7xl mx-auto flex items-center justify-between px-4 py-3">
      <div class="flex items-center space-x-2">
        <span class="text-cyan-400 text-2xl">⬡</span>
        <span class="font-bold text-xl">Raise<span class="text-cyan-400">Net</span></span>
      </div>
    </div>
  </nav>

  <!-- LOGIN FORM -->
  <main class="flex-1 flex items-center justify-center">
    <div class="bg-gray-900 rounded-2xl shadow-xl p-10 w-full max-w-md">
      <h2 class="text-3xl font-extrabold mb-2 text-center">Login to <span class="gradient-text">RaiseNet</span></h2>
      <p class="text-gray-400 mb-6 text-center">Access your dashboard and start your project journey.</p>
      <form id="login-form" class="flex flex-col gap-4">
        <input type="email" id="login-email" placeholder="Email address" required class="px-4 py-2 rounded border border-gray-700 bg-gray-800 text-gray-100 focus:outline-none focus:border-cyan-400" />
        <input type="password" id="login-password" placeholder="Password" required class="px-4 py-2 rounded border border-gray-700 bg-gray-800 text-gray-100 focus:outline-none focus:border-cyan-400" />
        <button type="submit" class="bg-cyan-500 text-white px-6 py-2 rounded hover:bg-cyan-600 font-semibold">Login</button>
      </form>
      <div id="login-message" class="mt-3 text-sm text-center"></div>
      <div class="mt-6 text-center text-gray-400 text-xs">
        Don't have an account? <a href="/register.html" class="text-cyan-400 hover:underline">Register</a>
      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="bg-gray-900 border-t border-gray-800 py-6 mt-8">
    <div class="max-w-7xl mx-auto px-4 flex flex-col md:flex-row items-center justify-between gap-4">
      <div class="flex items-center space-x-2">
        <span class="text-cyan-400 text-2xl">⬡</span>
        <span class="font-bold text-xl">Raise<span class="text-cyan-400">Net</span></span>
      </div>
      <div class="text-xs text-gray-500 mt-2 md:mt-0">
        &copy; 2024 RaiseNet. All rights reserved.
      </div>
    </div>
  </footer>

  <script src="js/sidebar-logout.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
